<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A10 이용가이드 사이트 접속 확인 보고서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6 text-slate-700">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex justify-between items-start bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">A10 이용가이드 사이트 접속 확인 보고서</h1>
                <div class="text-sm text-slate-400 mt-1">
                    <span id="view-period">조회기간: 로딩 중...</span>
                    <span class="mx-2">|</span>
                    <span id="report-date">작성일: 로딩 중...</span>
                </div>
            </div>
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium flex items-center gap-1 shadow-sm transition-colors">
                <span>🖨️</span> 인쇄 / PDF 저장
            </button>
        </div>

        <div class="grid grid-cols-5 gap-4">
            <div class="bg-white p-5 rounded-2xl border-l-[4px] border-blue-500 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex flex-col justify-between h-32">
                <div class="text-sm font-semibold text-slate-400">최근 점검 상태</div>
                <div id="stat-status" class="text-2xl font-extrabold text-blue-600">로딩 중</div>
                <div>
                    <span id="badge-status" class="inline-flex items-center gap-1 bg-slate-100 text-slate-600 text-xs font-medium px-2.5 py-1 rounded-full">
                        -
                    </span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border-l-[4px] border-slate-400 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex flex-col justify-between h-32">
                <div class="text-sm font-semibold text-slate-400">당월 점검 총 건수</div>
                <div class="flex items-baseline gap-1">
                    <span id="stat-total" class="text-3xl font-extrabold text-slate-800">-</span>
                    <span class="text-sm font-bold text-slate-500">건</span>
                </div>
                <div></div>
            </div>

            <div class="bg-white p-5 rounded-2xl border-l-[4px] border-emerald-500 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex flex-col justify-between h-32">
                <div class="text-sm font-semibold text-slate-400">정상 건수</div>
                <div class="flex items-baseline gap-1">
                    <span id="stat-success" class="text-3xl font-extrabold text-emerald-600">-</span>
                    <span class="text-sm font-bold text-emerald-500">건</span>
                </div>
                <div></div>
            </div>

            <div class="bg-white p-5 rounded-2xl border-l-[4px] border-rose-500 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex flex-col justify-between h-32">
                <div class="text-sm font-semibold text-slate-400">오류 건수</div>
                <div class="flex items-baseline gap-1">
                    <span id="stat-fail" class="text-3xl font-extrabold text-rose-500">-</span>
                    <span class="text-sm font-bold text-rose-500">건</span>
                </div>
                <div>
                    <span id="badge-fail" class="hidden inline-flex items-center gap-1 bg-rose-50 text-rose-600 text-xs font-semibold px-2.5 py-1 rounded-full border border-rose-100">
                        ⚠️ 확인 필요
                    </span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border-l-[4px] border-emerald-500 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex flex-col justify-between h-32">
                <div class="text-sm font-semibold text-slate-400">성공률</div>
                <div id="stat-rate" class="text-3xl font-extrabold text-emerald-600">-</div>
                <div></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 flex justify-between items-center border-b border-slate-100">
                <h3 class="text-md font-bold text-slate-800">기간별 성공률 현황</h3>
            </div>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="bg-slate-50 text-slate-500 font-semibold border-b border-slate-100">
                        <th class="py-3 px-6">기간</th>
                        <th class="py-3 px-6">전체</th>
                        <th class="py-3 px-6">성공</th>
                        <th class="py-3 px-6">실패</th>
                        <th class="py-3 px-6">성공률</th>
                    </tr>
                </thead>
                <tbody id="table-data-body" class="divide-y divide-slate-100 text-slate-600">
                    <tr>
                        <td colspan="5" class="py-8 text-center text-slate-400">데이터를 동기화하는 중입니다...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwlpz3RQlNHEI4Q5uWyzfVOsk3ouBcwRO8pxMc2e9Jgk2hO4qsi5yXja1Soliad_Tge/exec';

        async function fetchDashboardData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data && data.length > 0) {
                    let totalSummary = 0;
                    let successSummary = 0;
                    let failSummary = 0;
                    let tableRowsHtml = '';

                    // 최신 점검 데이터 기준 상태 정의 (데이터 배열의 첫 번째 원소)
                    const latestRow = data[0];
                    const latestFail = parseInt(latestRow.fail || 0);
                    
                    const statusText = document.getElementById('stat-status');
                    const statusBadge = document.getElementById('badge-status');

                    if (latestFail > 0) {
                        statusText.innerText = "오류";
                        statusText.className = "text-2xl font-extrabold text-rose-500";
                        statusBadge.innerText = "⚠️ 확인 필요";
                        statusBadge.className = "inline-flex items-center gap-1 bg-rose-50 text-rose-600 text-xs font-semibold px-2.5 py-1 rounded-full border border-rose-100";
                    } else {
                        statusText.innerText = "정상";
                        statusText.className = "text-2xl font-extrabold text-blue-600";
                        statusBadge.innerText = "✓ 정상 운영 중";
                        statusBadge.className = "inline-flex items-center gap-1 bg-emerald-50 text-emerald-600 text-xs font-semibold px-2.5 py-1 rounded-full border border-emerald-100";
                    }

                    // 누적 데이터 연산 및 테이블 바인딩
                    data.forEach(row => {
                        const total = parseInt(row.total || 0);
                        const success = parseInt(row.success || 0);
                        const fail = parseInt(row.fail || 0);
                        const rate = row.rate || '0%';

                        totalSummary += total;
                        successSummary += success;
                        failSummary += fail;

                        tableRowsHtml += `
                            <tr class="hover:bg-slate-50/50">
                                <td class="py-3 px-6 font-medium text-slate-900">${row.date}</td>
                                <td class="py-3 px-6">${total}</td>
                                <td class="py-3 px-6">${success}</td>
                                <td class="py-3 px-6 text-${fail > 0 ? 'rose-500 font-medium' : 'slate-600'}">${fail}</td>
                                <td class="py-3 px-6">
                                    <div class="flex items-center gap-3">
                                        <span class="text-emerald-600 font-bold w-10">${rate}</span>
                                        <div class="w-24 bg-slate-100 h-2 rounded-full overflow-hidden">
                                            <div class="bg-emerald-500 h-full rounded-full" style="width: ${rate}"></div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });

                    // 요약 데이터 업데이트
                    document.getElementById('stat-total').innerText = totalSummary;
                    document.getElementById('stat-success').innerText = successSummary;
                    document.getElementById('stat-fail').innerText = failSummary;
                    
                    // 실패 건수가 있으면 오류 카드 하단에 '확인 필요' 배지 노출
                    const badgeFail = document.getElementById('badge-fail');
                    if (failSummary > 0) {
                        badgeFail.classList.remove('hidden');
                    } else {
                        badgeFail.classList.add('hidden');
                    }

                    const totalRate = totalSummary > 0 ? Math.round((successSummary / totalSummary) * 100) : 0;
                    document.getElementById('stat-rate').innerText = `${totalRate}%`;

                    // 테이블 갱신
                    document.getElementById('table-data-body').innerHTML = tableRowsHtml;

                    // 헤더 정보 설정
                    if(data.length > 0) {
                        document.getElementById('view-period').innerText = `조회기간: ${data[data.length - 1].date} ~ ${data[0].date}`;
                    }
                    document.getElementById('report-date').innerText = `작성일: ${new Date().toLocaleDateString()}`;
                }
            } catch (error) {
                console.error("대시보드 데이터 동기화 실패:", error);
                document.getElementById('table-data-body').innerHTML = `
                    <tr>
                        <td colspan="5" class="py-8 text-center text-rose-500 font-medium">
                            보안 백엔드 서버 연동 실패. API 상태를 확인하세요.
                        </td>
                    </tr>
                `;
            }
        }

        window.onload = fetchDashboardData;
    </script>
</body>
</html>
