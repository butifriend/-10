<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amaranth 10 이용가이드 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #111111;
            --card-bg: #1a1a1a;
            --accent-color: #00ff7f;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 28px; }
        h1 span { color: var(--accent-color); }

        .btn-refresh {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        /* 대시보드 그리드 레이아웃 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .card.full-width {
            grid-column: span 3;
        }

        .card h3 {
            margin: 0 0 15px 0;
            color: var(--text-muted);
            font-size: 16px;
            text-transform: uppercase;
        }

        .card .value {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* 테이블 스타일 */
        .table-container {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #222;
            color: var(--accent-color);
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        tr:hover {
            background-color: #222;
        }

        .loading {
            text-align: center;
            font-size: 20px;
            color: var(--text-muted);
            padding: 50px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><span>Amanda 10</span> 상태 기록 대시보드</h1>
        <button class="btn-refresh" onclick="fetchData()"><i class="fa-solid fa-rotate"></i> 새로고침</button>
    </header>

    <div id="loading-view" class="loading">
        <i class="fa-solid fa-spinner fa-spin"></i> 구글 시트에서 데이터를 불러오는 중입니다...
    </div>

    <div id="dashboard-view" style="display: none;">
        <div class="dashboard-grid">
            <div class="card">
                <h3>총 누적 기록</h3>
                <div id="total-count" class="value">0</div>
            </div>
            <div class="card">
                <h3>최근 업데이트 항목</h3>
                <div id="recent-item" class="value" style="font-size: 20px; padding-top: 12px;">-</div>
            </div>
            <div class="card">
                <h3>대시보드 동기화 시각</h3>
                <div id="sync-time" class="value" style="font-size: 20px; padding-top: 12px;">-</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card full-width">
                <h3>시간대별 상태 트렌드 (최근 10개 데이터 기준)</h3>
                <div style="height: 300px; position: relative;">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card full-width" style="text-align: left;">
                <h3>상세 데이터 로그</h3>
                <div class="table-container">
                    <table id="data-table">
                        <thead>
                            <tr id="table-headers">
                                </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // CSV 데이터를 2차원 배열로 파싱하는 함수
    function parseCSV(text) {
        let lines = text.split('\n');
        return lines.map(line => {
            // 쉼표로 분리하되 쌍따옴표 내부의 쉼표는 무시하는 정규식
            let matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(val => val.replace(/^"|"$/g, '')) : [];
        }).filter(row => row.length > 0);
    }

    let trendChart = null;

    async function fetchData() {
        document.getElementById('loading-view').style.display = 'block';
        document.getElementById('dashboard-view').style.display = 'none';

        const csvUrl = "https://docs.google.com/spreadsheets/d/132r740wkRSzKtyRe1LKomEZ-2jmdVJmFDBDHYY_PPxc/export?format=csv&gid=0";
        
        try {
            // 캐시 우회를 위해 랜덤 파라미터 추가하여 매번 완벽히 최신 데이터를 가져옴
            const response = await fetch(`${csvUrl}&cachebust=${Date.now()}`);
            const dataText = await response.text();
            const data = parseCSV(dataText);

            if (data.length < 2) {
                alert("시트에 데이터가 부족하거나 올바르지 않습니다.");
                return;
            }

            const headers = data[0];
            const rows = data.slice(1);

            // 1. 요약 정보 반영
            document.getElementById('total-count').innerText = `${rows.length} 건`;
            
            // 마지막 행 데이터를 최근 데이터로 간주
            const lastRow = rows[rows.length - 1];
            document.getElementById('recent-item').innerText = lastRow[1] || '데이터 없음';
            
            const now = new Date();
            document.getElementById('sync-time').innerText = now.toLocaleTimeString();

            // 2. 테이블 생성
            const headersRow = document.getElementById('table-headers');
            headersRow.innerHTML = '';
            headers.forEach(header => {
                const th = document.createElement('th');
                th.innerText = header;
                headersRow.appendChild(th);
            });

            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            // 최신 기록이 맨 위로 오도록 배열을 역순으로 출력 (최대 15개)
            const displayRows = [...rows].reverse().slice(0, 15);
            displayRows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.innerText = cell;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            // 3. 차트 그리기 (최근 10개 데이터 대상 샘플 꺾은선 그래프)
            const chartRows = rows.slice(-10);
            const labels = chartRows.map(r => r[0]); // 1번째 컬럼 (보통 일시/시간)
            const chartData = chartRows.map(r => parseFloat(r[2]) || 1); // 3번째 컬럼 데이터 수치화 (없으면 기본값 1)

            const ctx = document.getElementById('trendChart').getContext('2d');
            
            if (trendChart) { trendChart.destroy(); } // 기존 차트 초기화

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '상태 수치 지표',
                        data: chartData,
                        borderColor: '#00ff7f',
                        backgroundColor: 'rgba(0, 255, 127, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                        y: { grid: { color: '#333' }, ticks: { color: '#aaa' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    }
                }
            });

            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("데이터를 가져오는 중 오류가 발생했습니다. 콘솔 창을 확인하세요.");
        }
    }

    // 페이지 로드 시 최초 실행
    window.onload = fetchData;
</script>
</body>
</html>
